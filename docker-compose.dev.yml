version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mvp_db
      POSTGRES_USER: mvp_user
      POSTGRES_PASSWORD: mvp_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
    environment:
      DATABASE_URL: postgresql+psycopg2://mvp_user:mvp_pass@db:5432/mvp_db
      SEED_ON_STARTUP: "true"
      DEV_CMD: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./Backend/py_backend:/app:cached
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: ["/bin/sh", "/app/docker-entrypoint.sh"]

  frontend:
    image: node:18-alpine
    working_dir: /app
    environment:
      DEV_CMD: npm run dev -- --host 0.0.0.0 --port 5173
      NODE_ENV: development
    volumes:
      - ./Frontend:/app:cached
      - frontend_node_modules:/app/node_modules
    ports:
      - "3001:5173"
    depends_on:
      - backend
    command: ["/bin/sh", "/app/docker-entrypoint.sh"]

volumes:
  db_data:
  frontend_node_modules:
