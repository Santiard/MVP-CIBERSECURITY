services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mvp_db
      POSTGRES_USER: mvp_user
      POSTGRES_PASSWORD: mvp_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend
    environment:
      DATABASE_URL: postgresql+psycopg2://mvp_user:mvp_pass@db:5432/mvp_db
      SEED_ON_STARTUP: "true"
      PASSWORD_RESET_FRONTEND_BASE: "http://localhost:3001"
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./Frontend
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  db_data:
